name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '9,39 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tiki-talk
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tiki-talk/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Generate static soccer ticker
        if: github.event_name == 'schedule'
        run: npm run generate:ticker
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}

      - name: Reuse deployed soccer ticker
        if: github.event_name != 'schedule'
        run: |
          mkdir -p dist/api

          if curl --fail --silent --show-error --location --max-time 15 \
            https://tikitalk.us/api/soccer-ticker \
            --output dist/api/soccer-ticker.tmp \
            && node -e "JSON.parse(require('node:fs').readFileSync('dist/api/soccer-ticker.tmp', 'utf8'))"; then
            mv dist/api/soccer-ticker.tmp dist/api/soccer-ticker
            cp dist/api/soccer-ticker dist/api/soccer-ticker.json
          else
            rm -f dist/api/soccer-ticker.tmp
            fallback_date="$(TZ=America/New_York date +%Y-%m-%d)"
            generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf '{\n  "date": "%s",\n  "items": [],\n  "status": "empty",\n  "cache": {\n    "category": "push-build-fallback",\n    "ttlMs": 1800000\n  },\n  "source": "push-build-fallback",\n  "generatedAt": "%s"\n}\n' "$fallback_date" "$generated_at" > dist/api/soccer-ticker
            cp dist/api/soccer-ticker dist/api/soccer-ticker.json
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: tiki-talk/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
